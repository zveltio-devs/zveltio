name: zveltio

# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    # In dev, override to run with hot-reload via bun watch
    command: ["bun", "run", "--watch", "packages/engine/src/index.ts"]
    environment:
      NODE_ENV: development
      BETTER_AUTH_SECRET: "dev-secret-not-for-production"
      BETTER_AUTH_URL: "http://localhost:3000"
    volumes:
      - ./packages:/app/packages:ro
      - ./extensions:/app/extensions:ro
    ports:
      - "3000:3000"

  # Expose postgres port for local tools (DBeaver, psql, etc.)
  postgres:
    ports:
      - "5432:5432"
