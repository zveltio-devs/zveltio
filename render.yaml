services:
  - type: web
    name: zveltio
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zveltio-db
          property: connectionString
      - key: PORT
        value: 3000
    healthCheckPath: /api/health

databases:
  - name: zveltio-db
    databaseName: zveltio
    plan: free
