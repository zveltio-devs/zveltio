{{- /*
Engine secrets. Skipped when the user supplies `engine.existingSecret` —
that lets ops manage secrets externally (sealed-secrets, External Secrets
Operator, etc.) without churning the chart.

`stringData` lets us write plaintext; Kubernetes encodes to base64
internally. Helm's `nindent` preserves whatever indentation the user
provided in values.yaml for multi-line values.
*/ -}}
{{- if not .Values.engine.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zveltio.fullname" . }}-env
  labels:
    {{- include "zveltio.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "zveltio.databaseUrl" . | quote }}
  {{- with .Values.engine.config.nativeDatabaseUrl }}
  NATIVE_DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with (include "zveltio.valkeyUrl" .) }}
  VALKEY_URL: {{ . | quote }}
  {{- end }}
  BETTER_AUTH_SECRET: {{ .Values.engine.config.betterAuthSecret | quote }}
  {{- with .Values.engine.config.betterAuthUrl }}
  BETTER_AUTH_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.encryptionKey }}
  ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.mailEncryptionKey }}
  MAIL_ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.aiKeyEncryptionKey }}
  AI_KEY_ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.metricsToken }}
  METRICS_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.otelExporterOtlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.registryPublicKeysJson }}
  REGISTRY_PUBLIC_KEYS_JSON: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.config.s3.endpoint }}
  S3_ENDPOINT: {{ . | quote }}
  S3_BUCKET: {{ $.Values.engine.config.s3.bucket | quote }}
  S3_REGION: {{ $.Values.engine.config.s3.region | quote }}
  S3_ACCESS_KEY_ID: {{ $.Values.engine.config.s3.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ $.Values.engine.config.s3.secretAccessKey | quote }}
  {{- end }}
{{- end }}
