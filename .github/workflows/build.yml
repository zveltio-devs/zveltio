name: Build Check

on:
  push:
    branches: [main, master]

jobs:
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install
      - name: Build all packages (Turborepo)
        run: bun run build
