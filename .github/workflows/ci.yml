name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install
      - name: Type check engine
        run: cd packages/engine && bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install
      - name: Run unit tests
        run: cd packages/engine && bun run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zveltio_test
          POSTGRES_USER: postgres
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
        run: bun packages/engine/src/db/migrate.ts
      - name: Verify DB schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d zveltio_test -c "\dt" | head -40 || true
          PGPASSWORD=postgres psql -h localhost -U postgres -d zveltio_test -c "SELECT version, name FROM zv_schema_versions ORDER BY version DESC LIMIT 5" || true
      - name: Start engine in background
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          VALKEY_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          BETTER_AUTH_URL: http://localhost:3099
          PORT: '3099'
          NODE_ENV: test
          ZVELTIO_EXTENSIONS_PATH: ${{ github.workspace }}/extensions
        run: bun packages/engine/src/index.ts > /tmp/engine.log 2>&1 &
      - name: Wait for engine to start
        run: |
          echo "Waiting for engine on port 3099..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3099/api/health > /dev/null 2>&1; then
              echo "Engine ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Engine did not become ready within 60s"
          echo "--- Engine logs ---"
          cat /tmp/engine.log || true
          exit 1
      - name: Show engine startup logs
        run: |
          echo "=== Engine startup log ==="
          cat /tmp/engine.log || true
      - name: Smoke test auth endpoint
        run: |
          echo "--- Auth sign-up smoke test ---"
          SIGNUP_BODY=$(curl -s -X POST http://localhost:3099/api/auth/sign-up/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!","name":"Smoke"}' 2>&1)
          SIGNUP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3099/api/auth/sign-up/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke2@test.local","password":"TestPass123!","name":"Smoke2"}' 2>&1)
          echo "Sign-up response body: $SIGNUP_BODY"
          echo "Sign-up HTTP status: $SIGNUP_STATUS"
          echo ""
          echo "--- Auth sign-in smoke test ---"
          SIGNIN_BODY=$(curl -s -X POST http://localhost:3099/api/auth/sign-in/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!"}' 2>&1)
          SIGNIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3099/api/auth/sign-in/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!"}' 2>&1)
          echo "Sign-in response body: $SIGNIN_BODY"
          echo "Sign-in HTTP status: $SIGNIN_STATUS"
          echo ""
          echo "--- Settings public test ---"
          curl -s -w "\n---HTTP_STATUS:%{http_code}" http://localhost:3099/api/settings/public 2>&1 || true
          echo ""
          echo "--- Users unauthenticated test ---"
          curl -s -w "\n---HTTP_STATUS:%{http_code}" http://localhost:3099/api/users 2>&1 || true
          echo ""
          echo "--- Engine logs at smoke test time ---"
          cat /tmp/engine.log || true
          echo "--- End engine logs ---"
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          TEST_VALKEY_URL: redis://localhost:6379
          TEST_PORT: '3099'
          NODE_ENV: test
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
        run: cd packages/engine && bun run test:integration
      - name: Show engine logs (always)
        if: always()
        run: cat /tmp/engine.log || true
