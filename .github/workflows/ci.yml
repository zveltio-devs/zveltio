name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      # Drift checker + codegen walk migration files in BOTH repos. CI
      # only checks out one at a time, so we shallow-clone the
      # extensions sibling next to the workspace. Path matches
      # EXTENSIONS_ROOT default in both scripts (../zveltio-extensions
      # relative to the engine repo root).
      - name: Clone zveltio-extensions sibling (for drift checker + codegen)
        run: git clone --depth=1 https://github.com/zveltio-devs/zveltio-extensions.git ../zveltio-extensions
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build SDK
        run: cd packages/sdk && bun run build
      - name: Type check engine
        run: cd packages/engine && bun run typecheck
      - name: Type check CLI
        # The CLI ships the publish/pack/validate tooling. A TS error here
        # (e.g. a bad cast in a test) previously slipped through because CI
        # only typechecked the engine. Keep it gated.
        run: cd packages/cli && bun run typecheck
      - name: Type check SDK
        run: cd packages/sdk && bun run typecheck
      - name: Audit regression check
        # Fail the build if any privileged route has lost its auditLog() call.
        # See scripts/audit-regression-check.ts for the maintained list.
        run: |
          bun run scripts/audit-inventory.ts
          bun run scripts/audit-regression-check.ts

      - name: Route collision check
        # Fails if a static route is registered after a same-method param
        # route that would shadow it (Hono resolves in registration order;
        # the param route wins and the UUID cast on :id 500s). See
        # scripts/route-collision-check.ts.
        run: bun run scripts/route-collision-check.ts

      - name: Schema drift check
        # Walks all migrations + DbSchema.ts + every route/lib file and
        # reports three classes of drift:
        #   - tables/columns referenced in code but not declared by any
        #     migration (FATAL — these crash at runtime against Postgres)
        #   - DbSchema.ts ↔ migration interface drift (WARN only — typing
        #     gap, closed by the upcoming codegen pass)
        # The script is also useful locally — `bun run scripts/schema-drift-check.ts`.
        run: bun run scripts/schema-drift-check.ts

      - name: Schema codegen freshness
        # Regenerates packages/engine/src/db/schema.generated.ts from
        # the current migrations and fails the build if it differs from
        # what's committed. This keeps the generated file in lockstep
        # with the SQL on disk — a stale generated file is a sign that
        # someone added a migration but forgot to re-run the codegen.
        # Local fix: `bun run scripts/schema-codegen.ts && bun run format` then commit.
        # The format step is required because biome reformats long
        # union literals to multi-line; codegen emits single-line, so
        # without format the diff is just whitespace noise.
        run: |
          bun run scripts/schema-codegen.ts
          bun run format >/dev/null
          if ! git diff --exit-code packages/engine/src/db/schema.generated.ts; then
            echo "::error::schema.generated.ts is stale — run \`bun run scripts/schema-codegen.ts && bun run format\` and commit the diff."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: noExplicitAny ratchet
        # Fails if any package introduced a NEW `any` suppression above its
        # baseline (docs/HARDENING-9-PLAN.md H-01). Type the value instead.
        run: bun run any:ratchet
      - name: Import boundaries
        # Fails if code outside a lib/ subsystem deep-imports one of its
        # internal files instead of going through the barrel index
        # (docs/HARDENING-9-PLAN.md H-08). Import from lib/<subsystem> instead.
        run: bun run scripts/import-boundaries.ts
      - name: Format check
        # Blocks merges that introduce unformatted code. Run `bun run format`
        # locally before pushing to fix any violations.
        run: bun run format:check

  security-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Report all advisories (informational)
        # Full report in the log for triage — never fails the build.
        run: bun audit || true
      - name: Gate on CRITICAL advisories
        # Blocks a merge that pulls in a CRITICAL-severity CVE. High/moderate are
        # reported above but not gated yet. Triage (2026-07-08): better-auth XSS
        # is already resolved (engine on 1.6.23, no longer advised); DOMPurify
        # advisories closed by the 3.4.11 bump. Remaining highs are not
        # exploitable in our usage (Kysely JSON-path/sql.lit APIs are unused;
        # we're Postgres, not MySQL) or need a breaking major bump tracked as
        # planned work (nodemailer 6→9, kysely 0.27→0.29; dev-only vite/esbuild).
        # Tighten to `--audit-level=high` once those planned bumps land.
        run: bun audit --audit-level=critical

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # SDK dist/ is .gitignored — build it so engine tests can import
      # `@zveltio/sdk/testing` (exports map points at dist/testing/index.js).
      - name: Build SDK
        run: cd packages/sdk && bun run build
      - name: Run unit tests (with coverage)
        run: cd packages/engine && bun run test:unit:coverage
      - name: Coverage ratchet
        # Fails if engine lib/ line coverage drops below baseline
        # (docs/HARDENING-9-PLAN.md H-02). Add tests for changed code.
        run: bun run coverage:gate
      - name: Coverage summary
        if: always()
        run: |
          {
            echo '### Engine coverage (unit suite)'
            echo '```'
            bun run coverage:gate || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Run CLI tests
        # Tier-policy resolution + peer-deps allowlist drift guard live in
        # the CLI; run them in CI (typecheck alone doesn't exercise them).
        run: cd packages/cli && bun test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zveltio_test
          POSTGRES_USER: postgres
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # SDK dist/ is .gitignored — build it so the engine (and its tests)
      # can import `@zveltio/sdk/testing` and `@zveltio/sdk/extension`.
      - name: Build SDK
        run: cd packages/sdk && bun run build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
        run: bun packages/engine/src/db/migrate.ts
      - name: Verify DB schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d zveltio_test -c "\dt" | head -40 || true
          PGPASSWORD=postgres psql -h localhost -U postgres -d zveltio_test -c "SELECT version, name FROM zv_schema_versions ORDER BY version DESC LIMIT 5" || true
      - name: Start engine in background
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          VALKEY_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          BETTER_AUTH_URL: http://localhost:3099
          PORT: '3099'
          NODE_ENV: test
          ZVELTIO_EXTENSIONS_PATH: ${{ github.workspace }}/extensions
          SLOW_QUERY_THRESHOLD_MS: '0'
        run: bun packages/engine/src/index.ts > /tmp/engine.log 2>&1 &
      - name: Wait for engine to start
        run: |
          echo "Waiting for engine on port 3099..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3099/api/health > /dev/null 2>&1; then
              echo "Engine ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Engine did not become ready within 60s"
          echo "--- Engine logs ---"
          cat /tmp/engine.log || true
          exit 1
      - name: Show engine startup logs
        run: |
          echo "=== Engine startup log ==="
          cat /tmp/engine.log || true
      - name: Smoke test auth endpoint
        run: |
          echo "--- Auth sign-up smoke test ---"
          SIGNUP_BODY=$(curl -s -X POST http://localhost:3099/api/auth/sign-up/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!","name":"Smoke"}' 2>&1)
          SIGNUP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3099/api/auth/sign-up/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke2@test.local","password":"TestPass123!","name":"Smoke2"}' 2>&1)
          echo "Sign-up response body: $SIGNUP_BODY"
          echo "Sign-up HTTP status: $SIGNUP_STATUS"
          echo ""
          echo "--- Auth sign-in smoke test ---"
          SIGNIN_BODY=$(curl -s -X POST http://localhost:3099/api/auth/sign-in/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!"}' 2>&1)
          SIGNIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3099/api/auth/sign-in/email \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.local","password":"TestPass123!"}' 2>&1)
          echo "Sign-in response body: $SIGNIN_BODY"
          echo "Sign-in HTTP status: $SIGNIN_STATUS"
          echo ""
          echo "--- Settings public test ---"
          curl -s -w "\n---HTTP_STATUS:%{http_code}" http://localhost:3099/api/settings/public 2>&1 || true
          echo ""
          echo "--- Users unauthenticated test ---"
          curl -s -w "\n---HTTP_STATUS:%{http_code}" http://localhost:3099/api/users 2>&1 || true
          echo ""
          echo "--- Engine logs at smoke test time ---"
          cat /tmp/engine.log || true
          echo "--- End engine logs ---"
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          TEST_VALKEY_URL: redis://localhost:6379
          TEST_PORT: '3099'
          NODE_ENV: test
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          SLOW_QUERY_THRESHOLD_MS: '0'
        run: cd packages/engine && bun run test:integration
      - name: Show engine logs (always)
        if: always()
        run: cat /tmp/engine.log || true

  perf-smoke:
    name: Perf Smoke (CRUD + list p95 budgets)
    runs-on: ubuntu-latest
    # Catches catastrophic regressions only — see bench/ci-check.ts for
    # threshold rationale. Track drift via the uploaded artifact.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zveltio_test
          POSTGRES_USER: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports: ['6379:6379']
        options: >-
          --health-cmd "valkey-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 'latest' }
      - run: bun install --frozen-lockfile
      - run: cd packages/sdk && bun run build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
        run: bun packages/engine/src/db/migrate.ts
      - name: Seed admin user
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_test
          VALKEY_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          BETTER_AUTH_URL: http://localhost:3000
          # NODE_ENV=test makes enqueueDDLJob synchronously await the
          # job's completion (see packages/engine/src/lib/ddl-queue.ts:177).
          # Without this, perf-smoke would race the pg-boss worker poll
          # interval and time out on the very first collection-create.
          NODE_ENV: test
        # Use the engine's own better-auth sign-up to create the admin so the
        # password hash format matches whatever the runtime expects.
        run: |
          bun packages/engine/src/index.ts > /tmp/engine.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            sleep 1
          done
          echo "--- engine log so far ---"
          cat /tmp/engine.log | head -40
          echo "--- end engine log ---"
          curl -sf -X POST http://localhost:3000/api/auth/sign-up/email \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"admin1234","name":"Admin"}' \
            > /tmp/signup.json || true
          cat /tmp/signup.json || true
      - name: Grant god role to bench admin
        env:
          PGPASSWORD: postgres
        # Admin routes check `user.role === 'god'`. Fresh sign-ups land with
        # the default role and would 401 on /api/collections. The integration
        # tests do the same thing (see tests/integration/etag.test.ts).
        run: |
          psql -h localhost -U postgres -d zveltio_test \
            -c "UPDATE \"user\" SET role = 'god' WHERE email = 'admin@example.com'"
      - name: Run perf smoke
        env:
          BENCH_BASE_URL: http://localhost:3000
          BENCH_EMAIL: admin@example.com
          BENCH_PASSWORD: admin1234
        run: bun run bench/ci-check.ts
      - name: Dump engine log on failure
        if: failure()
        # Greps for the DDL-queue + pg-boss lines first so the most relevant
        # signal lands at the top of the log output, then the full tail.
        run: |
          echo '=== DDL-queue / pg-boss lines ==='
          grep -E 'ddl-queue|pg-boss|DDL queue' /tmp/engine.log || true
          echo
          echo '=== Last 80 lines of engine log ==='
          tail -80 /tmp/engine.log || true
      - name: Upload bench result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench/results/ci.json
          if-no-files-found: ignore
      - name: Engine logs (always)
        if: always()
        run: cat /tmp/engine.log || true
