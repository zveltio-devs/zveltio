name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0). Must match an existing git tag v<version>.'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc
          - next

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.10' }

      - run: bun install --frozen-lockfile

      - name: Set package versions
        run: |
          VERSION="${{ inputs.version }}"
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            node -e "
              const fs = require('fs');
              const p = '$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '${VERSION}';
              for (const section of ['dependencies','devDependencies','peerDependencies']) {
                if (!j[section]) continue;
                for (const [k, v] of Object.entries(j[section])) {
                  if (v === 'workspace:*') j[section][k] = '${VERSION}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Build packages
        run: |
          cd packages/sdk && bun run build && cd -
          cd packages/sdk-react && bun run build && cd -
          cd packages/sdk-vue && bun run build && cd -
          cd packages/cli && bun run build && cd -

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            cd $pkg
            PKG_NAME=$(node -e "console.log(require('./package.json').name)")
            PKG_VER=$(node -e "console.log(require('./package.json').version)")
            if npm view "${PKG_NAME}@${PKG_VER}" version &>/dev/null 2>&1; then
              echo "⚠ ${PKG_NAME}@${PKG_VER} already published, skipping"
              cd -
              continue
            fi
            echo "Publishing ${PKG_NAME}@${PKG_VER} → ${{ inputs.tag }}"
            npm publish --access public --tag ${{ inputs.tag }} --provenance
            cd -
          done
