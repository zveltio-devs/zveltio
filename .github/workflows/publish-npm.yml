name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0). Must match an existing git tag v<version>.'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc
          - next

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.10' }

      - run: bun install --frozen-lockfile

      - name: Set package versions
        run: |
          VERSION="${{ inputs.version }}"
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            node -e "
              const fs = require('fs');
              const p = '$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '${VERSION}';
              for (const section of ['dependencies','devDependencies','peerDependencies']) {
                if (!j[section]) continue;
                for (const [k, v] of Object.entries(j[section])) {
                  if (v === 'workspace:*') j[section][k] = '${VERSION}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Build packages
        run: |
          cd packages/sdk && bun run build && cd -
          cd packages/sdk-react && bun run build && cd -
          cd packages/sdk-vue && bun run build && cd -
          cd packages/cli && bun run build && cd -

      # Trusted publishing needs the registry CONFIGURED (so npm knows where
      # to run the OIDC exchange) but WITHOUT a token. setup-node's
      # registry-url gives us the registry + the NPM_CONFIG_USERCONFIG path,
      # but it also writes a placeholder `_authToken` that makes npm attempt
      # (failing) token auth instead of OIDC — we strip that below.
      # Node must be >= 22.14.0 for OIDC trusted publishing (npm docs).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1. Upgrade explicitly,
      # then replace the user .npmrc with a registry-only config (no token).
      # With `id-token: write` above and a trusted publisher configured on
      # npmjs.com for each package (org/repo + this workflow), `npm publish`
      # authenticates via the GitHub OIDC token — NO npm token, nothing to
      # expire. Provenance is attached automatically.
      - name: Upgrade npm + clear token placeholder for OIDC
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"
          printf 'registry=https://registry.npmjs.org/\n' > "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

      - name: Publish to npm (OIDC trusted publishing)
        run: |
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            cd $pkg
            PKG_NAME=$(node -e "console.log(require('./package.json').name)")
            PKG_VER=$(node -e "console.log(require('./package.json').version)")
            if npm view "${PKG_NAME}@${PKG_VER}" version &>/dev/null 2>&1; then
              echo "⚠ ${PKG_NAME}@${PKG_VER} already published, skipping"
              cd -
              continue
            fi
            echo "Publishing ${PKG_NAME}@${PKG_VER} → ${{ inputs.tag }}"
            npm publish --access public --tag ${{ inputs.tag }}
            cd -
          done
