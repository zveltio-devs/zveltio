name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 3.0.0-beta.3). Must match an existing git tag v<version>.'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc
          - next

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.10' }

      - run: bun install --frozen-lockfile

      - name: Set package versions
        run: |
          VERSION="${{ inputs.version }}"
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            node -e "
              const fs = require('fs');
              const p = '$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '${VERSION}';
              for (const section of ['dependencies','devDependencies','peerDependencies']) {
                if (!j[section]) continue;
                for (const [k, v] of Object.entries(j[section])) {
                  if (v === 'workspace:*') j[section][k] = '${VERSION}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Build packages
        run: |
          cd packages/sdk && bun run build && cd -
          cd packages/sdk-react && bun run build && cd -
          cd packages/sdk-vue && bun run build && cd -
          cd packages/cli && bun run build && cd -

      # Node >= 22.14.0 + npm >= 11.5.1 are required for OIDC trusted
      # publishing. registry-url configures the registry (needed for the
      # OIDC exchange) and a placeholder token .npmrc.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm >= 11.5.1 needed for OIDC trusted publishing. After upgrading,
      # overwrite the user .npmrc with a registry-only line so setup-node's
      # placeholder _authToken doesn't short-circuit OIDC into (failing)
      # token auth.
      - name: Upgrade npm + clear token placeholder for OIDC
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"
          printf 'registry=https://registry.npmjs.org/\n' > "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

      # Pure OIDC trusted publishing — NO token. With `id-token: write`
      # (above) and a trusted publisher configured on npmjs.com for each
      # package (org zveltio-devs, repo zveltio, workflow publish-npm.yml),
      # `npm publish` authenticates via the GitHub OIDC token. Provenance is
      # attached automatically. Nothing to expire, nothing to rotate.
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          # Don't let one package's failure (e.g. a not-yet-configured
          # trusted publisher) halt the others — attempt all four, collect
          # failures, and fail the job at the end if any didn't publish.
          failed=""
          for pkg in packages/sdk packages/sdk-react packages/sdk-vue packages/cli; do
            cd $pkg
            PKG_NAME=$(node -e "console.log(require('./package.json').name)")
            PKG_VER=$(node -e "console.log(require('./package.json').version)")
            if npm view "${PKG_NAME}@${PKG_VER}" version &>/dev/null 2>&1; then
              echo "⚠ ${PKG_NAME}@${PKG_VER} already published, skipping"
              cd -
              continue
            fi
            echo "Publishing ${PKG_NAME}@${PKG_VER} → ${{ inputs.tag }}"
            if npm publish --access public --tag ${{ inputs.tag }}; then
              echo "✓ ${PKG_NAME}@${PKG_VER} published"
            else
              echo "✗ ${PKG_NAME}@${PKG_VER} FAILED"
              failed="${failed} ${PKG_NAME}"
            fi
            cd -
          done
          if [ -n "$failed" ]; then
            echo "::error::Failed to publish:${failed}"
            exit 1
          fi
