name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zveltio-engine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build Studio + Client ────────────────────────────
  build-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.10' }
      - run: bun install --frozen-lockfile
      - run: cd packages/sdk && bun run build
      - run: cd packages/studio && bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: studio-dist
          path: packages/studio/dist/
          retention-days: 1
      # Studio source tarball — used by install.sh for rebuild-at-install.
      #
      # Must be self-contained: when extracted on the install host there is
      # no workspace root and no SDK source nearby, so `bun install` would
      # fail to resolve `@zveltio/sdk@workspace:*`. We pre-bundle the
      # already-built SDK alongside the Studio source and rewrite the dep
      # to a `file:` reference so bun install resolves it offline.
      - name: Package Studio source
        run: |
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/studio" "$STAGE/sdk"

          # Studio source — strip node_modules, dist, runtime artifacts.
          rsync -a --exclude=node_modules --exclude=dist \
                --exclude='static/runtime' \
                packages/studio/ "$STAGE/studio/"

          # SDK pre-built (already produced earlier in this same job).
          rsync -a --exclude=node_modules --exclude=src --exclude=testing \
                packages/sdk/ "$STAGE/sdk/"

          # Rewrite the workspace dep so bun install can resolve it on a
          # host that has no monorepo context. `file:../sdk` works with
          # frozen-lockfile. Generate a portable bun.lock here (after the
          # monorepo build above) so install hosts don't re-resolve caret
          # ranges to newer SvelteKit/Vite stacks that break install-time
          # rebuilds.
          if [ -f "$STAGE/studio/package.json" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$STAGE/studio/package.json'));
              for (const k of ['dependencies','devDependencies']) {
                if (!p[k]) continue;
                for (const dep of Object.keys(p[k])) {
                  if (p[k][dep] === 'workspace:*') p[k][dep] = 'file:../sdk';
                }
              }
              fs.writeFileSync('$STAGE/studio/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          fi
          rm -f "$STAGE/studio/bun.lockb" "$STAGE/studio/package-lock.json"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('$STAGE/studio/package.json'));
            p.dependencies['@sveltejs/kit'] = '2.61.1';
            p.dependencies['@sveltejs/adapter-static'] = '3.0.10';
            p.devDependencies['vite'] = '8.0.14';
            p.overrides = {
              '@sveltejs/vite-plugin-svelte': '5.1.1',
              rolldown: '1.0.2',
              vite: '8.0.14',
            };
            fs.writeFileSync('$STAGE/studio/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          (cd "$STAGE/studio" && bun install)

          tar -czf /tmp/studio-source.tar.gz -C "$STAGE" studio sdk
      - uses: actions/upload-artifact@v4
        with:
          name: studio-source
          path: /tmp/studio-source.tar.gz
          retention-days: 1
      - run: cd packages/client && bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/
          retention-days: 1

  # ── Job 2: Build Binaries ────────────────────────────────────
  # Smoke test on the freshly-compiled linux-x64 binary. Catches the class
  # of bugs typecheck + dev-mode CI can't see — only the compiled binary
  # exposes them. Real bugs this would have caught:
  #   - alpha.106: gen-embedded-migrations.ts not run → tables missing
  #   - alpha.107: route-ordering collisions surface only at HTTP layer
  #   - alpha.108: pg_last_checkpoint() invalid only against real PG
  #   - alpha.109/110: extension loader cache-buster + audit FK + symlink
  #
  # Strategy: spin up a real Postgres, boot the binary, create a god
  # user, install + enable the CRM extension via marketplace API. Any
  # 500 fails the build.
  smoke-binary:
    name: Smoke (compiled binary + Postgres)
    needs: build-binaries
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zveltio_smoke
          POSTGRES_USER: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-zveltio-linux-x64
          path: ./
      - name: Stage smoke fixtures (inline subapp, worker isolation, global mount)
        # Three fixtures, three code paths:
        #   hello-ext        — inline + subapp (default for first-party)
        #   hello-ext-worker — Bun.Worker isolation + subapp
        #   hello-ext-global — inline + global mount (route at engine root)
        # All three are self-contained bundles committed in this repo
        # so the smoke job doesn't depend on registry.zveltio.com or
        # zveltio-extensions sibling clones.
        run: |
          mkdir -p ./extensions
          cp -r packages/engine/src/tests/fixtures/hello-ext ./extensions/hello-ext
          cp -r packages/engine/src/tests/fixtures/hello-ext-worker ./extensions/hello-ext-worker
          cp -r packages/engine/src/tests/fixtures/hello-ext-global ./extensions/hello-ext-global

      - name: Boot binary + smoke marketplace enable
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zveltio_smoke
          BETTER_AUTH_SECRET: smoke-secret-32-chars-long-zzzzzz
          BETTER_AUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: smoke-encryption-key-32-bytes-aaaaaaaaaaaaaaaa
          EXTENSIONS_DIR: ${{ github.workspace }}/extensions
          PORT: '3000'
          NODE_ENV: production
        run: |
          chmod +x zveltio-linux-x64
          ./zveltio-linux-x64 &
          ENGINE_PID=$!

          # Wait up to 60s for health/ready (covers migration apply time)
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health/ready >/dev/null 2>&1; then
              echo "✓ Engine booted"; break
            fi
            sleep 1
            if [ $i -eq 60 ]; then
              echo "::error::Engine did not become ready in 60s"
              kill $ENGINE_PID 2>/dev/null || true
              exit 1
            fi
          done

          # Verify migrations 002-005 applied (catches alpha.106-style
          # missing embedded migrations).
          MIGCOUNT=$(curl -fsS http://localhost:3000/api/health/ready 2>&1 | grep -o '"migrations":{[^}]*"ok":true' || true)
          if [ -z "$MIGCOUNT" ]; then
            echo "::error::Migrations report not OK on health/ready"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          # Create a god user via CLI so we can hit privileged endpoints.
          ./zveltio-linux-x64 create-god \
            --email smoke@test.invalid \
            --password SmokePass123! \
            --name "Smoke Bot" || true

          # Sign in and grab cookie.
          curl -fsS -X POST http://localhost:3000/api/auth/sign-in/email \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke@test.invalid","password":"SmokePass123!"}' \
            -c cookies.txt -o /tmp/signin.json
          if ! grep -q '"redirect"' /tmp/signin.json; then
            echo "::error::Sign-in failed"; cat /tmp/signin.json
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          # Marketplace install + enable the hello-ext fixture. This
          # exercises the exact code path that broke alpha.100–113
          # (kysely / hono-types / peer-deps / bundle-hash-drift /
          # autocrlf etc.) on the compiled binary. The fixture is on
          # disk under EXTENSIONS_DIR so no registry round-trip — the
          # smoke job stays green even if registry.zveltio.com is down.
          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext/install \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/install.json
          if ! grep -q '"success":true' /tmp/install.json; then
            echo "::error::Install failed"; cat /tmp/install.json
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext/enable \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/enable.json
          if ! grep -q '"success":true' /tmp/enable.json; then
            echo "::error::Enable failed — likely a module-resolution or schema-mismatch regression."
            echo "::error::Body: $(cat /tmp/enable.json)"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          # Hit the extension's route — proves register() actually ran,
          # not just that enable returned 200.
          ROUTE_BODY=$(curl -fsS http://localhost:3000/ext/hello-ext/health \
            -b cookies.txt || true)
          if ! echo "$ROUTE_BODY" | grep -q '"ok":true'; then
            echo "::error::hello-ext route /ext/hello-ext/health did not return ok"
            echo "::error::Body: $ROUTE_BODY"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          echo "✅ hello-ext install + enable + route OK on the compiled binary."

          # Repeat for hello-ext-worker — exercises the C-minimal
          # worker isolation path (manifest.engine.isolation: 'worker').
          # If anything in the IPC chain (route proxy / DB proxy /
          # bundle re-import inside worker) regresses, this fails.
          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext-worker/install \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/install-worker.json
          if ! grep -q '"success":true' /tmp/install-worker.json; then
            echo "::error::hello-ext-worker install failed"; cat /tmp/install-worker.json
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext-worker/enable \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/enable-worker.json
          if ! grep -q '"success":true' /tmp/enable-worker.json; then
            echo "::error::hello-ext-worker enable failed — likely a worker-host wiring regression."
            echo "::error::Body: $(cat /tmp/enable-worker.json)"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi

          WORKER_BODY=$(curl -fsS http://localhost:3000/ext/hello-ext-worker/health \
            -b cookies.txt || true)
          if ! echo "$WORKER_BODY" | grep -q '"runtime":"bun-worker"'; then
            echo "::error::hello-ext-worker /health did not return runtime=bun-worker"
            echo "::error::Body: $WORKER_BODY"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi
          echo "✅ hello-ext-worker isolation path OK on the compiled binary."

          # Repeat for hello-ext-global — exercises mountStrategy='global'
          # which is what extensions use when they need a route outside
          # the per-extension /ext/<name>/ namespace.
          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext-global/install \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/install-global.json
          if ! grep -q '"success":true' /tmp/install-global.json; then
            echo "::error::hello-ext-global install failed"; cat /tmp/install-global.json
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi
          curl -fsS -X POST http://localhost:3000/api/marketplace/hello-ext-global/enable \
            -b cookies.txt -H 'Content-Type: application/json' -d '{}' \
            -o /tmp/enable-global.json
          if ! grep -q '"success":true' /tmp/enable-global.json; then
            echo "::error::hello-ext-global enable failed"
            echo "::error::Body: $(cat /tmp/enable-global.json)"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi
          GLOBAL_BODY=$(curl -fsS http://localhost:3000/hello-global/health \
            -b cookies.txt || true)
          if ! echo "$GLOBAL_BODY" | grep -q '"mount":"global"'; then
            echo "::error::hello-ext-global /hello-global/health did not return mount=global"
            echo "::error::Body: $GLOBAL_BODY"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi
          echo "✅ hello-ext-global mount strategy OK on the compiled binary."

          # Hit the new admin health endpoint to confirm it serves all
          # three extensions with sensible per-extension records.
          HEALTH_BODY=$(curl -fsS http://localhost:3000/api/admin/extensions/health \
            -b cookies.txt || true)
          for ext in hello-ext hello-ext-worker hello-ext-global; do
            if ! echo "$HEALTH_BODY" | grep -q "\"name\":\"$ext\""; then
              echo "::error::extensions/health did not list $ext"
              echo "::error::Body: $HEALTH_BODY"
              kill $ENGINE_PID 2>/dev/null || true; exit 1
            fi
          done
          if ! echo "$HEALTH_BODY" | grep -q '"isolation":"worker"'; then
            echo "::error::extensions/health missing isolation=worker for hello-ext-worker"
            echo "::error::Body: $HEALTH_BODY"
            kill $ENGINE_PID 2>/dev/null || true; exit 1
          fi
          echo "✅ /api/admin/extensions/health reports all 3 extensions correctly."

          kill $ENGINE_PID 2>/dev/null || true
          wait $ENGINE_PID 2>/dev/null || true

  # The binary itself does NOT embed studio/client — they are served at runtime
  # from ./studio-dist and ./client-dist (Docker: in image, Native: downloaded separately)
  build-binaries:
    needs: build-studio
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            binary: zveltio-linux-x64
          - os: ubuntu-latest
            target: bun-linux-x64-baseline
            binary: zveltio-linux-x64-baseline
          - os: ubuntu-latest
            target: bun-linux-arm64
            binary: zveltio-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            binary: zveltio-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            binary: zveltio-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.10' }
      - run: bun install --frozen-lockfile
      - name: Generate embedded migrations
        # The committed embedded.ts may lag behind the sql/ directory
        # if a migration was added without regenerating. Regenerate at
        # build time so the binary always has the full set.
        run: cd packages/engine && bun scripts/gen-embedded-migrations.ts
      - name: Generate worker runtime source bundle
        # Bun --compile doesn't auto-bundle workers; we ship the worker
        # JS as a string constant the host writes to /tmp at first
        # spawn. The committed file may lag if the runtime source
        # changed without regen — regenerate at build time so the
        # binary always carries the latest worker code.
        run: cd packages/engine && bun scripts/gen-worker-source.ts
      - name: Build binary
        run: |
          bun build packages/engine/src/index.ts \
            --compile \
            --outfile ${{ matrix.binary }} \
            --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  # ── Job 3: Build Docker Image ────────────────────────────────
  build-docker:
    needs: build-studio
    runs-on: ubuntu-latest
    # The Docker image is an independent artifact (pushed to its own registry).
    # A QEMU/buildx infra flake must NOT block the binary + Studio release or the
    # downstream publish + extension-registry sync. beta.9 was lost exactly this
    # way. Keep it non-blocking; generate-assets no longer depends on it.
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: studio-dist
          path: packages/studio/dist/
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
        with:
          version: v0.20.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, '-rc.') }}
      - name: Build and push
        shell: bash
        run: |
          TAG_ARGS=$(echo "${{ steps.meta.outputs.tags }}" | awk '{print "--tag "$0}' | tr '\n' ' ')
          LABEL_ARGS=$(echo "${{ steps.meta.outputs.labels }}" | awk '{print "--label "$0}' | tr '\n' ' ')
          for attempt in 1 2 3; do
            eval docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              $TAG_ARGS \
              $LABEL_ARGS \
              --cache-from type=gha \
              --cache-to "type=gha,mode=max" \
              . && exit 0
            echo "::warning::Build attempt $attempt failed; retrying in 30s…"
            sleep 30
          done
          exit 1

  # ── Job 4: Generate Release Assets ──────────────────────────
  generate-assets:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          IS_PRERELEASE="false"
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc)\. ]]; then IS_PRERELEASE="true"; fi
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          # Channel: alpha | beta | rc | stable
          CHANNEL="stable"
          if [[ "${{ github.ref_name }}" == *"alpha"* ]]; then CHANNEL="alpha"; fi
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then CHANNEL="beta"; fi
          if [[ "${{ github.ref_name }}" == *"-rc."* ]]; then CHANNEL="rc"; fi
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Download studio
        uses: actions/download-artifact@v4
        with:
          name: studio-dist
          path: studio-dist-download/

      - name: Download studio source
        uses: actions/download-artifact@v4
        with:
          name: studio-source
          path: studio-source-download/

      - name: Download client
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client-dist-download/

      - name: Package studio + client + source
        run: |
          tar -czf dist/studio.tar.gz -C studio-dist-download .
          cp studio-source-download/studio-source.tar.gz dist/studio-source.tar.gz
          tar -czf dist/client.tar.gz -C client-dist-download .

      - name: Generate compose files
        run: |
          chmod +x scripts/generate-compose.sh
          mkdir -p release-assets
          ./scripts/generate-compose.sh \
            "${{ steps.version.outputs.version }}" \
            release-assets/

      - name: Copy other assets
        run: |
          cp .env.example release-assets/
          cp scripts/install.sh release-assets/
          chmod +x release-assets/install.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum zveltio-* > ../release-assets/checksums.sha256
          cat ../release-assets/checksums.sha256

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          cat > release-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "channel": "${CHANNEL}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "engine_image": "ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}",
            "binaries": {
              "linux_x64": "${BASE}/zveltio-linux-x64",
              "linux_x64_baseline": "${BASE}/zveltio-linux-x64-baseline",
              "linux_arm64": "${BASE}/zveltio-linux-arm64",
              "macos_x64": "${BASE}/zveltio-macos-x64",
              "macos_arm64": "${BASE}/zveltio-macos-arm64"
            },
            "compose": {
              "full": "${BASE}/docker-compose.yml",
              "infra_only": "${BASE}/docker-compose.infra.yml",
              "engine_only": "${BASE}/docker-compose.engine.yml"
            },
            "checksums": "${BASE}/checksums.sha256",
            "installer": "${BASE}/install.sh",
            "release_notes": "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          }
          EOF

      - name: Flatten assets into single directory
        run: |
          mkdir -p flat-assets
          cp dist/zveltio-* flat-assets/
          cp dist/studio.tar.gz flat-assets/
          cp dist/studio-source.tar.gz flat-assets/
          cp dist/client.tar.gz flat-assets/
          cp release-assets/* flat-assets/

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: flat-assets/
          retention-days: 1

  # ── Job 5: Publish Release ───────────────────────────────────
  publish-release:
    needs: generate-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: all-assets/
          merge-multiple: true

      - name: Extract version info
        id: info
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          IS_PRERELEASE="false"
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc)\. ]]; then IS_PRERELEASE="true"; fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.info.outputs.prerelease == 'true' }}

          generate_release_notes: true
          files: |
            all-assets/zveltio-linux-x64
            all-assets/zveltio-linux-x64-baseline
            all-assets/zveltio-linux-arm64
            all-assets/zveltio-macos-x64
            all-assets/zveltio-macos-arm64
            all-assets/studio.tar.gz
            all-assets/studio-source.tar.gz
            all-assets/client.tar.gz
            all-assets/docker-compose.yml
            all-assets/docker-compose.infra.yml
            all-assets/docker-compose.engine.yml
            all-assets/checksums.sha256
            all-assets/latest.json
            all-assets/install.sh
            all-assets/.env.example
          body: |
            ## Zveltio v${{ steps.info.outputs.version }}

            ### ⚡ Quick Install
            ```bash
            curl -fsSL https://get.zveltio.com/install.sh | bash
            ```

            ### 🐳 Docker Only
            ```bash
            curl -fsSL https://get.zveltio.com/releases/${{ steps.info.outputs.version }}/docker-compose.yml -o docker-compose.yml
            curl -fsSL https://get.zveltio.com/releases/${{ steps.info.outputs.version }}/.env.example -o .env
            # Edit .env then:
            docker compose up -d
            ```

            ### 📦 Manual Binary
            ```bash
            # Linux x64
            curl -fsSL https://get.zveltio.com/releases/${{ steps.info.outputs.version }}/zveltio-linux-x64 -o zveltio
            chmod +x zveltio && ./zveltio start
            ```

            ### 🔧 Compose Builder
            Customize your installation: **https://get.zveltio.com/builder**

  # ── Job 7: Update zveltio-get repo ──────────────────────────
  update-website:
    needs: publish-release
    runs-on: ubuntu-latest
    continue-on-error: true
    # Serialize push to zveltio-get so multiple parallel Release workflows
    # (e.g. when several tags are pushed at once) don't race on latest.json.
    # The race in alpha.94/.95/.96 batch left latest.json pointing at .95
    # because the .95 workflow happened to commit last. With this lock,
    # only one update-website job runs at a time across the whole repo;
    # later runs see the prior commit and produce a clean append.
    concurrency:
      group: zveltio-get-push
      cancel-in-progress: false
    # Run for ALL channels — latest.json and versions.json must always reflect reality.
    # sync-extensions is still stable-only (extensions are production infrastructure).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          merge-multiple: true

      - name: Checkout zveltio-get repo
        uses: actions/checkout@v4
        with:
          repository: zveltio-devs/zveltio-get
          token: ${{ secrets.ZVELTIO_GET_DEPLOY_TOKEN || github.token }}
          path: zveltio-get

      - name: Generate versions.json
        run: |
          chmod +x scripts/generate-versions-json.sh
          ./scripts/generate-versions-json.sh \
            "${{ github.repository }}" \
            zveltio-get/versions.json

      # Only overwrite latest.json if this release's version is >= what's
      # already on zveltio-get for the same channel. Without this guard,
      # a slower workflow for an OLDER tag (pushed earlier in a batch)
      # could finish last and downgrade latest.json — which is exactly
      # what happened on the alpha.94/.95/.96 batch.
      - name: Copy latest.json (only if newer or same)
        run: |
          NEW_FILE=$(find release-assets/ -name "latest.json" | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "No latest.json in release-assets — nothing to copy."
            exit 0
          fi

          # Read fields via fs.readFileSync, NOT require(). require() with a
          # bare relative path like "release-assets/latest.json" is treated as
          # a module name lookup and throws ERR_MODULE_NOT_FOUND. That was the
          # latent bug from alpha.97 that left zveltio-get stuck at alpha.96
          # for two consecutive releases.
          NEW_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$NEW_FILE','utf8')).version)")
          NEW_CHANNEL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$NEW_FILE','utf8')).channel)")

          if [ -f zveltio-get/latest.json ]; then
            CUR_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('zveltio-get/latest.json','utf8')).version)")
            CUR_CHANNEL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('zveltio-get/latest.json','utf8')).channel)")
            # Compare only within the same channel — alpha never downgrades alpha,
            # but a stable release should always win over any prerelease.
            if [ "$CUR_CHANNEL" = "$NEW_CHANNEL" ] || [ "$CUR_CHANNEL" = "alpha" -a "$NEW_CHANNEL" = "stable" ]; then
              IS_NEWER=$(NEW_VER="$NEW_VER" CUR_VER="$CUR_VER" node -e "
                const semver = (s) => s.replace(/^v/, '').split(/[.-]/).map(p => isNaN(+p) ? p : +p);
                const cmp = (a, b) => {
                  for (let i = 0; i < Math.max(a.length, b.length); i++) {
                    const x = a[i] ?? 0, y = b[i] ?? 0;
                    if (typeof x === 'number' && typeof y === 'number') { if (x !== y) return x - y; }
                    else { if (String(x) < String(y)) return -1; if (String(x) > String(y)) return 1; }
                  }
                  return 0;
                };
                process.stdout.write(cmp(semver(process.env.NEW_VER), semver(process.env.CUR_VER)) >= 0 ? 'yes' : 'no');
              ")
              if [ "$IS_NEWER" = "no" ]; then
                echo "Current latest.json is $CUR_VER ($CUR_CHANNEL), this workflow is $NEW_VER ($NEW_CHANNEL) — keeping current. Race-guard win."
                exit 0
              fi
            fi
          fi
          cp "$NEW_FILE" zveltio-get/latest.json
          echo "Updated latest.json → $NEW_VER ($NEW_CHANNEL)"

      - name: Commit and push to zveltio-get
        run: |
          cd zveltio-get
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull just in time — another serialized workflow may have just pushed.
          # With the concurrency lock above we won't be racing, but a Pull is
          # cheap insurance and lets the same workflow re-run cleanly.
          git pull --rebase --autostash origin master || true
          git add -f versions.json latest.json
          git diff --cached --quiet || git commit -m \
            "chore: update to ${{ github.ref_name }}"
          git push

  # ── Job 8: Trigger extensions sync ───────────────────────────
  sync-extensions:
    needs: publish-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Dispatch sync to zveltio-extensions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.EXTENSIONS_REPO_TOKEN != '' && secrets.EXTENSIONS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'zveltio-extensions',
              event_type: 'engine-released',
              client_payload: {
                version: '${{ steps.version.outputs.version }}',
              },
            });
