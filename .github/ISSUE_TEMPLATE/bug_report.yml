name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **Issues without a repro
        are usually closed** — please include the commands or steps that
        produced the problem. If you're not sure it's a bug, use
        [Discussions](https://github.com/zveltio-devs/zveltio/discussions)
        instead.
  - type: input
    id: version
    attributes:
      label: Zveltio version
      description: Run `curl http://localhost:3000/api/health/version` or read it from your binary.
      placeholder: 1.0.0-alpha.82
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Zveltio?
      options:
        - Single binary (zveltio-get install.sh)
        - Docker (single-host)
        - Proxmox LXC
        - Kubernetes
        - From source (bun run dev)
        - Other (please describe)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Copy-paste the error message verbatim. Avoid screenshots of text.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimum steps to reproduce
      placeholder: |
        1. Create a collection with…
        2. POST /api/data/foo with body { … }
        3. Observe 500 instead of 201
      render: bash
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Engine stderr or `/var/log/zveltio/*.log`. Trim to the relevant ~50 lines.
      render: text
