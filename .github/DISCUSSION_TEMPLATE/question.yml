title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about how Zveltio works, or how to use it for a
        specific use case? You're in the right place. For bug reports use
        the [issue tracker](https://github.com/zveltio-devs/zveltio/issues/new)
        instead.
  - type: textarea
    id: context
    attributes:
      label: What are you trying to accomplish?
      description: |
        Describe the goal, not the symptom. "I want to send a webhook when a
        record changes" is more useful than "webhooks don't work".
      placeholder: I want to…
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Configs, docs you've read, similar issues you've searched.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Zveltio version
      placeholder: 1.0.0-alpha.82
    validations:
      required: false
