<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="Zveltio Admin Studio" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <!-- PWA install (iOS home screen + standalone display). apple-touch-icon
         is ideally a PNG; the SVG works on iOS 16+ and can be swapped for a
         rasterized 180×180 later. -->
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zveltio" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('zveltio-theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
