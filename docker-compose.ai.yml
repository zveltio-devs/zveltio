# Zveltio — Self-Hosted AI Overlay
#
# Adds optional Ollama and DeepSeek containers to the Zveltio stack.
# Models are downloaded on first start and cached in named volumes.
#
# Usage — start together with the main stack:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d
#
# Start only one provider:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml \
#     --profile ai-ollama up -d
#
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml \
#     --profile ai-deepseek up -d
#
# GPU (NVIDIA) support is enabled automatically when a GPU is detected.
# If you have no GPU the containers will run on CPU — slower, but functional.
#
# After the containers are up, configure the provider in Zveltio Studio:
#   Studio → AI → Add Provider → Ollama
#   Base URL:  http://zveltio-ollama:11434   (for Ollama)
#              http://zveltio-deepseek:11434 (for DeepSeek)

name: zveltio

services:
  # ── Ollama (general-purpose LLMs: Llama, Mistral, Gemma, Phi …) ─────────────
  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    image: zveltio/ollama:latest
    container_name: zveltio-ollama
    profiles: [ai-ollama, ai]
    restart: unless-stopped
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    environment:
      # Comma-separated list of models to pull on first start
      OLLAMA_MODELS: '${OLLAMA_MODELS:-llama3.2}'
      # Optional: increase parallelism for concurrent requests
      OLLAMA_NUM_PARALLEL: '${OLLAMA_NUM_PARALLEL:-2}'
      # Optional: keep model in VRAM between requests (seconds, 0 = always unload)
      OLLAMA_KEEP_ALIVE: '${OLLAMA_KEEP_ALIVE:-300}'
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:11434/api/tags']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # first-run model pull can take a while
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - zveltio_internal

  # ── DeepSeek (reasoning + code — deepseek-r1 series) ─────────────────────────
  deepseek:
    build:
      context: ./docker/deepseek
      dockerfile: Dockerfile
    image: zveltio/deepseek:latest
    container_name: zveltio-deepseek
    profiles: [ai-deepseek, ai]
    restart: unless-stopped
    ports:
      - '${DEEPSEEK_PORT:-11435}:11434'
    environment:
      # Recommended models:
      #   deepseek-r1:7b   — ~4.7 GB,  runs on 8 GB RAM (CPU-only OK)
      #   deepseek-r1:14b  — ~9.0 GB,  needs 16 GB RAM or GPU
      #   deepseek-coder-v2:16b — best for code tasks, needs GPU
      OLLAMA_MODELS: '${DEEPSEEK_MODELS:-deepseek-r1:7b}'
      OLLAMA_NUM_PARALLEL: '${DEEPSEEK_NUM_PARALLEL:-1}'
      OLLAMA_KEEP_ALIVE: '${DEEPSEEK_KEEP_ALIVE:-300}'
    volumes:
      - deepseek_models:/root/.ollama
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:11434/api/tags']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s   # deepseek-r1 models are larger
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - zveltio_internal

volumes:
  ollama_models:
  deepseek_models:

networks:
  zveltio_internal:
    # Attach to the network created by the main docker-compose.yml
    external: true
    name: zveltio_zveltio_internal
